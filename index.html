<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Cockpit Preview</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #000000;
            overflow: hidden;
            color: #fff;
            font-family: sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        .app-wrapper {
            display: flex;
            width: 1920px;
            height: 1080px;
            transform-origin: center;
            /* transform set by JS syncScale() to fill viewport independently on X/Y */
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
            border-radius: 12px;
            overflow: hidden;
        }

        .canvas {
            width: 1920px;
            height: 1080px;
            position: relative;
            background-color: #FCFCFC;
            overflow: hidden;
        }

        /* --- Workspace Sidebar --- */
        .workspace {
            position: absolute;
            right: 24px;
            top: 84px;
            z-index: 9999;
            display: none;
            width: 400px;
            height: 884px;
            background-color: rgba(17, 17, 17, 0.9);
            padding: 30px;
            flex-direction: column;
            gap: 20px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            overflow-y: auto;
        }

        .workspace h2 {
            font-size: 20px;
            margin-bottom: 10px;
            color: #00FBFF;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .control-group label {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: #ccc;
        }

        .control-group span {
            font-family: monospace;
            color: #fff;
        }

        .control-group input[type="range"] {
            width: 100%;
            accent-color: #00FBFF;
        }

        .control-group input[type="color"] {
            width: 100%;
            height: 40px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            background: none;
        }

        .workspace-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .workspace-header h2 {
            margin-bottom: 0;
        }

        .save-btn {
            background: #00FBFF;
            color: #000;
            border: none;
            border-radius: 6px;
            padding: 6px 14px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 1px;
            white-space: nowrap;
            transition: opacity 0.2s;
        }

        .save-btn:hover {
            opacity: 0.8;
        }

        .save-btn:active {
            opacity: 0.6;
        }



        /* Status Bar */
        .new-status-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 1920px;
            height: 72px;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: transparent;
            padding: 0 40px;
            box-sizing: border-box;
            pointer-events: auto;
        }

        .new-status-bar .status-left,
        .new-status-bar .status-right {
            display: flex;
            align-items: center;
        }

        .new-status-bar .status-left {
            gap: 16px;
            cursor: pointer;
            pointer-events: auto;
            border-radius: 36px;
            /* slightly smaller to fit the bar precisely if it's 72px high */
            padding: 0 16px;
            transition: background-color 0.3s;
            height: 56px;
            margin-left: -16px;
            /* offset the padding to keep original visual position */
            box-sizing: border-box;
        }

        .new-status-bar .status-left.active-driving {
            background-color: #367CFF;
        }

        .new-status-bar .status-left.active-driving img:nth-child(1),
        .new-status-bar .status-left.active-driving img:nth-child(2) {
            filter: brightness(0) invert(1);
            opacity: 1;
        }

        .new-status-bar .status-left:active {
            transform: scale(0.95);
        }

        .new-status-bar .status-right {
            gap: 24px;
        }

        .new-status-bar .status-left img {
            width: 40px;
            height: 40px;
        }

        .new-status-bar .status-left:not(.active-driving) img:nth-child(1),
        .new-status-bar .status-left:not(.active-driving) img:nth-child(2) {
            opacity: 0.4;
        }

        .new-status-bar .status-temp {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 20px;
            font-weight: 700;
            color: #333;
        }

        .new-status-bar .status-temp img {
            width: auto;
            height: 40px;
        }

        .new-status-bar .status-pill {
            background: #EFF1F5;
            border-radius: 24px;
            /* Slightly larger border-radius to match 48px height */
            height: 48px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 12px;
            color: #111;
        }

        .new-status-bar .status-pill img {
            height: 40px;
            width: 40px;
            object-fit: contain;
        }

        .new-status-bar .status-pill.status-connections {
            gap: 16px;
        }

        .new-status-bar .status-value {
            font-size: 20px;
            /* Upgraded to 20 */
            font-weight: 700;
            display: flex;
            align-items: baseline;
            gap: 2px;
        }

        .new-status-bar .status-unit {
            font-size: 16px;
            /* Upgraded to 16 */
            font-weight: 500;
            color: #888;
        }

        .new-status-bar .status-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .new-status-bar .status-avatar:active {
            transform: scale(0.9);
        }

        .new-status-bar .status-time {
            font-size: 22px;
            font-weight: 700;
            color: #111;
            font-family: sans-serif;
        }

        .dock {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 1920px;
            z-index: 1000;
            pointer-events: none;
        }

        .new-dock {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 1872px;
            height: 88px;
            background: #FFFFFF;
            border-radius: 24px 24px 0 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding: 0 24px;
            box-sizing: border-box;
            pointer-events: auto;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.05);
        }

        /* Fixed Width Container Base */
        .new-dock .dock-group {
            height: 68px;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Default to center for icon-only groups */
            box-sizing: border-box;
            flex-shrink: 0;
        }

        /* Precise Widths */
        .new-dock .w-300 {
            width: 300px;
        }

        .new-dock .w-352 {
            width: 352px;
        }

        .new-dock .w-68 {
            width: 68px;
        }

        /* Precise Margins (Gaps) */
        .new-dock .m-gap-10 {
            margin-right: 10px;
        }

        .new-dock .m-gap-48 {
            margin-right: 48px;
        }

        /* Specific alignment for each group type */
        .new-dock .temp-group {
            justify-content: space-between;
            padding: 0 40px;
        }

        .new-dock .shortcut-group {
            justify-content: center;
            gap: 54px;
        }

        .new-dock .media-group-wrap {
            justify-content: center;
        }

        .new-dock .app-group {
            justify-content: space-between;
            /* Force exact 32px gaps within 352px width */
            padding: 0;
        }

        .new-dock .app-group img {
            width: 64px;
            height: 64px;
            border-radius: 14px;
            object-fit: contain;
            image-rendering: -webkit-optimize-contrast;
        }

        /* Scale compensation for icons with large transparent margins */
        .new-dock .app-group img[src*="browser"],
        .new-dock .app-group img[src*="avm"] {
            transform: scale(1.15);
        }

        .new-dock img {
            cursor: pointer;
            transition: transform 0.2s;
        }

        /* Combined scaling on hover to avoid resetting the base compensation */
        .new-dock .app-group img[src*="browser"]:hover,
        .new-dock .app-group img[src*="avm"]:hover {
            transform: scale(1.25);
        }

        .new-dock img:hover {
            transform: scale(1.1);
        }

        /* Generic Dot Divider */
        .new-dock .dot-divider {
            width: 6px;
            height: 6px;
            background: #A0A5AA;
            border-radius: 50%;
        }

        .new-dock .dot-divider.orange {
            background: #FF9500;
            box-shadow: 0 0 8px rgba(255, 149, 0, 0.6);
        }

        /* Temperature Style */
        .new-dock .temp-text {
            font-size: 32px;
            font-weight: 500;
            color: #333;
            font-family: 'Outfit', sans-serif;
            letter-spacing: -1px;
        }

        /* Home Icon Specific */
        .new-dock .home-icon {
            width: 68px;
            height: 68px;
            filter: brightness(0.2);
            margin-left: 12px;
        }

        /* Shortcut Icons (Updated to 34x34) */
        .new-dock .shortcut-icon {
            width: 34px;
            height: 34px;
            filter: brightness(0.2);
        }


        /* Media Player Redesign (Updated to 300x56 as per request) */
        .new-dock .media-capsule {
            display: flex;
            align-items: center;
            padding: 0 16px;
            background: #F1F3F6;
            border-radius: 28px;
            /* Half of 56px height for full pill shape */
            height: 56px;
            width: 300px;
            gap: 12px;
            box-sizing: border-box;
        }

        .new-dock .media-cover {
            width: 40px;
            height: 40px;
            border-radius: 20px;
            object-fit: cover;
        }

        .new-dock .media-info {
            display: flex;
            flex-direction: column;
            justify-content: center;
            flex-grow: 1;
            overflow: hidden;
            line-height: 1.2;
        }

        .new-dock .media-info .title {
            font-size: 15px;
            font-weight: 600;
            color: #111;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .new-dock .media-info .artist {
            font-size: 11px;
            color: #888;
        }

        .new-dock .media-play-icon {
            width: 20px;
            height: 20px;
            filter: brightness(0.2);
        }

        /* Independent Navigation Components */
        .nav-item-base {
            position: absolute;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            display: flex;
            align-items: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            z-index: 100;
            pointer-events: none;
            opacity: 0;
            box-sizing: border-box;
            transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .canvas.ui-ready .nav-item-base {
            opacity: 1;
            pointer-events: auto;
        }

        .nav-item-go-home {
            left: 44px;
            top: 118px;
            width: 370px;
            height: 72px;
            padding: 6px;
            overflow: visible;
            border-radius: 24px;
            transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .nav-item-search {
            left: 44px;
            top: 214px;
            width: 201px;
            height: 72px;
            padding: 0 24px;
            gap: 12px;
            color: #333;
            font-size: 20px;
            font-weight: 500;
            transition: top 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .nav-item-shortcuts {
            left: 269px;
            top: 214px;
            width: 145px;
            height: 72px;
            justify-content: space-evenly;
            transition: top 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .go-home-bg-layer {
            position: absolute;
            left: 6px;
            top: 6px;
            bottom: 6px;
            right: 6px;
            pointer-events: none;
            z-index: 0;
        }

        .go-home-fill {
            position: absolute;
            left: 6px;
            top: 6px;
            bottom: 6px;
            width: 104px;
            background: #367CFF;
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(54, 124, 255, 0.3);
            z-index: 1;
            transition: background 0.3s, border-radius 0.3s, left 0.3s, top 0.3s, bottom 0.3s, right 0.3s;
            touch-action: none;
        }

        .go-home-fill-content {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 358px;
            pointer-events: none;
            transition: all 0.2s ease-out;
        }

        .go-home-btn-placeholder {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 104px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .go-home-arrows {
            transition: opacity 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .go-home-text-wrapper {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            right: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .ngp-icon-wrapper {
            position: absolute;
            right: 12px;
            top: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            pointer-events: none;
        }

        .go-home-text {
            font-size: 18px;
            font-weight: 600;
            color: #000000;
            display: flex;
            align-items: baseline;
            transition: color 0.3s;
        }

        .go-home-text span {
            color: rgba(0, 0, 0, 0.6);
            font-weight: 400;
            margin-right: 8px;
            transition: color 0.3s;
        }

        .white-text {
            color: #ffffff !important;
        }

        .white-text span {
            color: rgba(255, 255, 255, 0.7) !important;
        }

        .ngp-icon {
            width: 44px;
            height: 44px;
            transition: filter 0.3s;
        }

        .invert-icon {
            filter: brightness(0) invert(1);
        }

        /* 激活交互 CSS */
        .nav-item-go-home.activated-inner .go-home-fill {
            left: 0 !important;
            top: 0 !important;
            bottom: 0 !important;
            right: 0 !important;
            width: 100% !important;
            border-radius: 24px !important;
            box-shadow: none !important;
        }

        .nav-item-go-home.activated-inner .go-home-btn-placeholder {
            opacity: 0;
        }

        .nav-item-go-home.activated-inner .go-home-fill-content {
            left: 6px;
            top: 6px;
            bottom: 6px;
            width: 358px;
        }

        .nav-item-go-home.activated-glow {
            background: transparent !important;
            backdrop-filter: none !important;
            -webkit-backdrop-filter: none !important;
            /* 采用截图给出的确切数值：第一层 0 0 7px 0px，第二层 0 0 23px 3px，颜色 3377FF */
            box-shadow: 0 0 7px 0px rgba(51, 119, 255, 1), 0 0 23px 3px rgba(51, 119, 255, 1) !important;
        }

        .nav-item-go-home.dismissed {
            opacity: 0 !important;
            transform: scale(0.9);
            pointer-events: none;
            transition: all 0.3s ease-out;
        }

        .nav-item-search.shifted-up,
        .nav-item-shortcuts.shifted-up {
            top: 118px !important;
            /* 顶替 Go Home 的位置 */
        }

        .canvas.state-2 .nav-item-search.shifted-up,
        .canvas.state-2 .nav-item-shortcuts.shifted-up {
            top: 46px !important;
        }

        .search-icon {
            width: 32px;
            height: 32px;
            opacity: 0.8;
        }

        .shortcut-icon-btn {
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .shortcut-icon-btn img {
            width: 32px;
            height: 32px;
            filter: brightness(0.1);
        }

        .v-divider {
            width: 1px;
            height: 32px;
            background: rgba(0, 0, 0, 0.1);
            /* Subtle divider */
            opacity: 0.5;
        }

        /* Hover/Active states */
        .nav-item-base:active {
            transform: none;
        }

        /* Volume/Sound Icon */
        .new-dock .volume-icon {
            width: 32px;
            height: 32px;
            filter: brightness(0.2);
        }

        /* 4 Dashes icon for layout cycle */
        .dash-icon {
            position: relative;
            width: 20px;
            height: 20px;
        }

        .dash-icon span {
            position: absolute;
            width: 6px;
            height: 2px;
            background: #fff;
            border-radius: 1px;
        }

        .dash-icon .d-top-left {
            top: 4px;
            left: 1px;
            transform: rotate(45deg);
        }

        .dash-icon .d-top-right {
            top: 4px;
            right: 1px;
            transform: rotate(-45deg);
        }

        .dash-icon .d-bottom-left {
            bottom: 4px;
            left: 1px;
            transform: rotate(-45deg);
        }

        .dash-icon .d-bottom-right {
            bottom: 4px;
            right: 1px;
            transform: rotate(45deg);
        }

        /* Map Window (Right Window) */
        .map-window {
            position: absolute;
            top: 72px;
            /* Guessing to vertically center with dock */
            left: 1944px;
            /* 1920 + 24 gap */
            width: 1240px;
            height: 912px;
            transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 1;
            border-radius: 24px;
            overflow: hidden;
            pointer-events: none;
        }

        /* --- GLOW EFFECTS STRUCTURE --- */

        /* Containers expand outwards to provide unclipped space for the blur */
        .glow-container {
            position: absolute;
            z-index: -1;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .canvas.state-2 .glow-container {
            opacity: 1;
        }

        /* The mask element that defines the exact shape of the ring */
        .glow-mask {
            position: absolute;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask-composite: exclude;
            overflow: hidden;
        }

        /* The giant spinning gradient inside the mask */
        .glow-spinner {
            position: absolute;
            top: -100%;
            left: 0;
            width: 100%;
            height: 200%;
            /* 替换为与胶囊光晕一致的红橙黄渐变色系 */
            background: linear-gradient(to bottom,
                    rgba(255, 90, 95, 1) 0%,
                    /* #FF5A5F */
                    rgba(255, 145, 0, 1) 12.5%,
                    /* #FF9100 */
                    rgba(255, 245, 157, 1) 25%,
                    /* #FFF59D */
                    rgba(255, 145, 0, 1) 37.5%,
                    /* #FF9100 */
                    rgba(255, 90, 95, 1) 50%,
                    /* #FF5A5F */
                    /* 下半部分完全重复，保证平滑衔接 */
                    rgba(255, 145, 0, 1) 62.5%,
                    rgba(255, 245, 157, 1) 75%,
                    rgba(255, 145, 0, 1) 87.5%,
                    rgba(255, 90, 95, 1) 100%);
            /* Speed up 300%: from 4s to 1.33s */
            animation: sweepGlow 1.33s linear infinite;
        }

        @keyframes sweepGlow {
            0% {
                transform: translateY(0);
            }

            100% {
                transform: translateY(50%);
            }
        }

        /* Container for the huge soft aura */
        .glow-aura-outer {
            position: absolute;
            inset: -2px;
            border-radius: 26px;
            z-index: -3;
            padding: 8px;
            /* Slightly thicker for wide spread */
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask-composite: exclude;
            opacity: 0;
            transition: opacity 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            pointer-events: none;
            filter: blur(24px);
        }

        .canvas.state-2 .glow-border,
        .canvas.state-2 .glow-aura {
            opacity: 1;
        }

        .canvas.state-2 .glow-aura-outer {
            opacity: 0.8;
            /* Make the massive outer blur slightly softer */
        }

        /* --- PARTICLE MATRIX CSS --- */
        @keyframes matrixPulse {
            0% {
                transform: scale(0);
                opacity: 0;
            }

            10% {
                transform: scale(var(--max-scale, 0.95));
                opacity: 1;
            }

            85% {
                opacity: 1;
            }

            100% {
                transform: scale(0);
                opacity: 0;
            }
        }

        .particle-pulse {
            animation-name: matrixPulse;
            animation-timing-function: ease-in-out;
            animation-iteration-count: infinite;
            transform-origin: center center;
            will-change: transform, opacity;
        }

        .map-bg {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 24px;
            /* Move border-radius here since overflow is visible on parent */
            background-color: #FCFCFC;
            /* Provide background just in case */
        }

        /* Scene Container (Left Window) */
        .scene-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 1920px;
            height: 1080px;
            transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 10;
            border-radius: 0;
            overflow: hidden;
        }

        .scene-bg {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* State 1 Elements */
        .weather-text {
            position: absolute;
            top: 100px;
            left: 80px;
            z-index: 20;
            transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .good-morning {
            position: absolute;
            top: 180px;
            left: 80px;
            z-index: 20;
            transition: opacity 0.4s ease-in-out;
        }

        /* Control Panel Elements (Inside Left Window) */
        .control-l,
        .control-r {
            position: absolute;
            z-index: 20;
            transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* State 1: Spread out in the full 1920x1080 scene */
        .control-l {
            bottom: 136px;
            left: 46px;
        }

        .control-r {
            top: 118px;
            right: 46px;
        }

        /* --- STATE 2 CSS --- */
        .canvas.state-2 .map-window {
            left: 656px;
            pointer-events: auto;
        }

        .canvas.state-2 .scene-container {
            top: 72px;
            /* Based on 912 height and 1080 total height */
            left: 24px;
            width: 608px;
            height: 912px;
            border-radius: 24px;
        }

        .canvas.state-2 .weather-text {
            top: 40px;
            left: 40px;
            transform: scale(0.8);
            transform-origin: top left;
        }

        .canvas.state-2 .good-morning {
            opacity: 0;
            pointer-events: none;
        }

        .canvas.state-2 .control-l {
            bottom: 40px;
            left: 40px;
        }

        .canvas.state-2 .nav-item-go-home {
            top: 46px;
            left: 40px;
        }

        .canvas.state-2 .nav-item-search {
            top: 142px;
            left: 40px;
            opacity: 0;
            pointer-events: none;
        }

        .canvas.state-2 .nav-item-shortcuts {
            top: 142px;
            left: 265px;
            opacity: 0;
            pointer-events: none;
        }

        .canvas.state-2 .control-r {
            top: 46px;
        }

        /* --- SWAPPED STATE (map left, scene right) --- */
        .canvas.state-2.swapped .map-window {}

        .canvas.state-2.swapped .scene-container {}

        /* Window Divider — rides inside map-window at its left edge */
        #divider-touch-zone {
            position: absolute;
            top: 72px;
            left: 604px;
            width: 56px;
            height: 912px;
            z-index: 30;
            cursor: col-resize;
            display: none;
            touch-action: none;
        }

        .canvas.state-2 #divider-touch-zone {
            display: block;
        }

        /* Mid-window Divider Handle */
        #mid-widget {
            position: absolute;
            left: 1905px;
            /* state A: 11px from right edge (1920 - 11 - 4) */
            top: 482px;
            /* vertically centered: center 528 - half of 93 */
            width: 4px;
            height: 93px;
            border-radius: 2px;
            background: rgba(0, 0, 0, 0.22);
            pointer-events: none;
            z-index: 30;
            transition: left 0.6s cubic-bezier(0.25, 1, 0.5, 1), opacity 80ms ease;
        }

        /* Overrides for left edge */
        .canvas.swapped:not(.state-c):not(.state-2) #mid-widget,
        .canvas.state-c:not(.swapped) #mid-widget {
            left: 11px;
        }

        /* Override for right edge when state-c swapped */
        .canvas.state-c.swapped #mid-widget {
            left: 1905px;
        }

        /* Map off-screen left when Scene is Full & Swapped */
        .canvas.swapped:not(.state-c):not(.state-2) .map-window {
            left: -1264px;
        }

        /* Scene off-screen right when Map is Full & Swapped */
        .canvas.state-c.swapped .scene-container {
            left: 1944px;
        }

        /* --- STATE C CSS (全屏地图) --- */
        .canvas.state-c .map-window {
            top: 0;
            left: 0;
            width: 1920px;
            height: 1080px;
            border-radius: 0;
            pointer-events: auto;
            box-shadow: none;
        }

        .canvas.state-c .map-bg {
            border-radius: 0;
        }

        .canvas.state-c .scene-container {
            width: 0;
            opacity: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .canvas.state-c .good-morning,
        .canvas.state-c .control-l,
        .canvas.state-c .control-r,
        .canvas.state-c .nav-item-base {
            opacity: 0;
            pointer-events: none;
        }

        .canvas.state-c #divider-touch-zone {
            display: none;
        }

        /* --- Map UI Elements --- */
        .map-ui-item {
            position: absolute;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(20px);

            top: 118px;

            top: 46px;

            left: 536px;
            top: 118px;
            width: 72px;
            height: 72px;

            top: 46px;
        }

        .map-ui-icon {
            width: 32px;
            height: 32px;
            opacity: 0.8;
        }

        .map-ui-icon.dark {
            filter: brightness(0.1);
        }

        .map-self-location {
            left: 46px;
            bottom: 136px;
            width: 72px;
            height: 72px;
            justify-content: center;
        }

        .canvas.state-2 .map-self-location {
            left: 40px;
            bottom: 40px;
        }

        #three-js-canvas-container canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100% !important;
            height: 100% !important;
            z-index: -1;
            /* 确保在 UI 图片下方 */
            pointer-events: auto;
            /* 允许 3D 场景接收点击/旋转事件 */
        }

        /* --- Fullscreen Button --- */
        #fullscreen-btn {
            position: fixed;
            top: 12px;
            right: 12px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.35);
            cursor: pointer;
            z-index: 999999;
            transition: background 0.2s, transform 0.2s;
            border: none;
            padding: 0;
        }

        #fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.75);
            transform: scale(1.3);
        }

        /* --- Loading Screen 样式 --- */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #111111;
            /* 极暗的深灰底色 */
            z-index: 99999;
            /* 保证它盖住屏幕上所有东西 */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .loading-logo {
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            font-size: 24px;
            font-weight: 300;
            letter-spacing: 6px;
            margin-bottom: 30px;
        }

        .loading-logo span {
            font-weight: 600;
            color: #00FBFF;
        }

        /* 进度条轨道 */
        .loading-bar-container {
            width: 400px;
            height: 2px;
            background-color: rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
            border-radius: 2px;
        }

        /* 进度条填充（带霓虹发光） */
        .loading-bar-fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 0%;
            background-color: #00FBFF;
            box-shadow: 0 0 15px rgba(0, 251, 255, 0.8), 0 0 30px rgba(0, 251, 255, 0.4);
            transition: width 0.1s ease-out;
            /* 让进度涨起来顺滑 */
        }

        /* 百分比数字 */
        .loading-text {
            color: rgba(255, 255, 255, 0.6);
            font-family: monospace;
            font-size: 14px;
            letter-spacing: 2px;
            margin-top: 15px;
            font-variant-numeric: tabular-nums;
            /* 保证数字跳动时宽度固定不变 */
        }

        /* 确保 UI 图片不会遮挡 3D 交互 */
        .weather-text,
        .good-morning,
        .control-l,
        .control-r {
            pointer-events: none;
        }
    </style>

</head>

                <label>内饰金属度 Int Metalness: <span id="val-int-metal">0.4</span></label>
                <input type="range" id="ctrl-int-metal" min="0" max="1" step="0.01" value="0.4">

                <label>内饰反射 Interior Env: <span id="val-int-env">0.3</span></label>

    </div> <!-- .app-wrapper end -->

    <script>
        const canvas = document.getElementById('canvas');


        // 布局循环按钮：根据分割线(bar)的当前位置，向左或向右“乒乓”循环
        const layoutCycleBtn = document.getElementById('layout-cycle-btn');
        const _layoutWidths = [1848, 1232, 616, 0];
        let _layoutIdx = 0;
        let _layoutDir = 1; // 1 为前进，-1 为后退
        let _isLayoutBtnClick = false;

        layoutCycleBtn.addEventListener('click', () => {
            _isLayoutBtnClick = true;
            _layoutIdx += _layoutDir;
            if (_layoutIdx >= _layoutWidths.length - 1) {
                _layoutIdx = _layoutWidths.length - 1;
                _layoutDir = -1; // 触底反弹
            } else if (_layoutIdx <= 0) {
                _layoutIdx = 0;
                _layoutDir = 1;  // 到头反弹
            }
            snapByLeftWidth(_layoutWidths[_layoutIdx]);

            setTimeout(() => {
                _isLayoutBtnClick = false;
            }, 50); // 给一点延迟防止同步事件误判
        });

        // ── DEBUG: 音量按钮 → 交换左右窗口 ──────────────────────────────
        document.getElementById('volume-debug-btn').addEventListener('click', () => {
            if (!canvas.classList.contains('state-2')) return; // 仅分屏时有效

            const midWidget = document.getElementById('mid-widget');
            if (midWidget) {
                midWidget.style.opacity = '0';
                setTimeout(() => {
                    midWidget.style.opacity = '1';
                }, 600);
            }

            const isSwapped = canvas.classList.contains('swapped');
            const leftEl = isSwapped ? mapWindow : sceneContainer_gesture;
            let currentLeftW = parseFloat(leftEl.style.width);
            if (isNaN(currentLeftW)) currentLeftW = 616;

            canvas.classList.toggle('swapped');
            const newLeftW = 1848 - currentLeftW;
            applySnap(newLeftW);

            const newIsSwapped = !isSwapped;
            let snapState = 'scene-1-3';
            if (newLeftW > 924) {
                snapState = newIsSwapped ? 'scene-1-3' : 'scene-2-3';
            } else {
                snapState = newIsSwapped ? 'scene-2-3' : 'scene-1-3';
            }
            window.dispatchEvent(new CustomEvent('app-state-change', { detail: { snap: snapState } }));
        });

        // 拖拽手势/状态改变时，同步循环按钮的内部索引（但不强行改变来回方向）
        window.addEventListener('app-state-change', (e) => {
            if (_isLayoutBtnClick) return; // 避免由于本身点击导致的宽度读取延迟造成的误同步
            if (window.isDrivingMode) return; // 行驶机位下维持参数不变
            const isSwapped = canvas.classList.contains('swapped');
            const isStateC = canvas.classList.contains('state-c');
            const isState2 = canvas.classList.contains('state-2');
            let currentW = 0;
            if (isStateC) {
                currentW = isSwapped ? 1848 : 0;
            } else if (!isState2) {
                currentW = isSwapped ? 0 : 1848;
            } else {
                const leftEl = isSwapped ? document.querySelector('.map-window') : document.getElementById('three-js-canvas-container');
                currentW = parseFloat(leftEl.style.width) || (leftEl ? leftEl.offsetWidth : 0) || 0;
            }

            let minDiff = Infinity, closest = 0;
            _layoutWidths.forEach((w, i) => {
                if (Math.abs(w - currentW) < minDiff) {
                    minDiff = Math.abs(w - currentW);
                    closest = i;
                }
            });
            _layoutIdx = closest;
            // 保留原本的 _layoutDir，这样接下来的点击就能接着原本的来回顺序走了
        });

        // 手势交互（同时支持鼠标和触摸）
        // 状态A（全屏车模）↔ 状态B（分屏）↔ 状态C（全屏地图）
        // 分屏内五档吸附：状态C | 左1/3 | 默认 | 右1/3 | 状态A


        const dividerZone = document.getElementById('divider-touch-zone');
        const midWidget = document.getElementById('mid-widget');
        const sceneContainer_gesture = document.getElementById('three-js-canvas-container');
        const mapWindow = document.querySelector('.map-window');
        let _dragMode = null; // null | 'right-edge' | 'left-edge' | 'divider'
        let _rightEdgeTimer = null;
        let _leftEdgeTimer = null;
        let _dividerDownX = 0; // 新增：记录按下分割线的 X 坐标
        let _edgeDownX = 0; // 记录边缘按下的坐标

        // 吸附位置常量
        const SNAP_R_SCENE_W = 1232;
        // 吸附阈值（相邻两档中点）
        const THRESH_C = 304;   // mid(0, 608) → 状态C
        const THRESH_R = 920;   // mid(608, 1232)
        const THRESH_A = 1560;  // mid(1232, ~1900) → 状态A

        // 辅助：清除所有手势 inline 样式
        function clearGestureStyles() {
            sceneContainer_gesture.style.width = '';
            sceneContainer_gesture.style.left = '';
            mapWindow.style.left = '';
            mapWindow.style.width = '';
            dividerZone.style.left = '';
            midWidget.style.left = '';
            midWidget.style.transition = '';
        }

        // 辅助：进入状态C
        function enterStateC() {
            canvas.classList.remove('state-2');
            canvas.classList.add('state-c');
            window.dispatchEvent(new CustomEvent('app-state-change', { detail: { snap: 'state-c' } }));
            requestAnimationFrame(clearGestureStyles);
        }

        // 辅助：进入状态A
        function enterStateA() {
            canvas.classList.remove('state-2');
            canvas.classList.remove('state-c');
            window.dispatchEvent(new CustomEvent('app-state-change', { detail: { snap: 'state-a' } }));
            requestAnimationFrame(clearGestureStyles);
        }

        // 辅助：应用某档吸附样式（leftW = 左侧窗口宽度）
        function applySnap(leftW) {
            requestAnimationFrame(() => {
                const swapped = canvas.classList.contains('swapped');
                if (leftW == null) {
                    clearGestureStyles();
                    return;
                }

                if (leftW < -24) leftW = -24;
                if (leftW > 1872) leftW = 1872;

                const rightLeft = leftW + 48;
                const rightW = Math.max(0, 1920 - rightLeft - 24);

                if (dividerZone && midWidget) {
                    dividerZone.style.left = (leftW - 4) + 'px';
                    midWidget.style.left = (leftW + 34) + 'px';
                }

                if (!swapped) {
                    sceneContainer_gesture.style.left = '24px';
                    sceneContainer_gesture.style.width = Math.max(0, leftW) + 'px';
                    mapWindow.style.left = rightLeft + 'px';
                    mapWindow.style.width = rightW + 'px';
                } else {
                    mapWindow.style.left = '24px';
                    mapWindow.style.width = Math.max(0, leftW) + 'px';
                    sceneContainer_gesture.style.left = rightLeft + 'px';
                    sceneContainer_gesture.style.width = rightW + 'px';
                }
            });
        }

        // 辅助：四档吸附判定（基于左侧窗口宽度）
        function snapByLeftWidth(leftW) {
            const isSwapped = canvas.classList.contains('swapped');
            if (leftW > 1540) {
                if (isSwapped) enterStateC(); else enterStateA();
            } else if (leftW > 924) {
                canvas.classList.remove('state-c');
                canvas.classList.add('state-2');
                applySnap(1232);
                window.dispatchEvent(new CustomEvent('app-state-change', { detail: { snap: isSwapped ? 'scene-1-3' : 'scene-2-3' } }));
            } else if (leftW > 308) {
                canvas.classList.remove('state-c');
                canvas.classList.add('state-2');
                applySnap(616);
                window.dispatchEvent(new CustomEvent('app-state-change', { detail: { snap: isSwapped ? 'scene-2-3' : 'scene-1-3' } }));
            } else {
                if (isSwapped) enterStateA(); else enterStateC();
            }
        }

        // 1) 边缘拖入侦测
        canvas.addEventListener('pointerdown', (e) => {
            if (_dragMode) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = 1920 / rect.width;
            const relX = (e.clientX - rect.left) * scaleX;
            const relY = (e.clientY - rect.top) * scaleX;

            if (relY > 980) return; // 排除底部 dock 栏区域，防止误触
            if (relY < 72) return; // 排除顶部 status 栏区域，防止误触

            const isStateA = !canvas.classList.contains('state-2') && !canvas.classList.contains('state-c');
            const isStateC = canvas.classList.contains('state-c');

            if ((isStateA || isStateC) && (relX >= 1840 || relX <= 80)) {
                e.preventDefault();
                _dragMode = relX >= 1840 ? 'right-edge' : 'left-edge';
                _edgeDownX = e.clientX; // 记录边缘按下的坐标

                // 立即隐藏 Good Morning（其它元素保持可见）
                const goodMorning = canvas.querySelector('.good-morning');
                if (goodMorning) goodMorning.style.opacity = '0';

                // 取消所有动画，让元素在 swapped 时能瞬间完成空间转移而不要飞越屏幕
                // 为了防止主窗口缩小产生跳变，保留主窗口的过渡动画；
                // 同时为了防止被召唤的副窗口飞越屏幕，取消副窗口的过渡动画
                const fastTransition = 'all 200ms ease-out';
                if (isStateA) {
                    sceneContainer_gesture.style.transition = fastTransition;
                    mapWindow.style.transition = 'none';
                } else {
                    sceneContainer_gesture.style.transition = 'none';
                    mapWindow.style.transition = fastTransition;
                }

                // 取消分割线（bar）的动画，保证它在拖拽时能百分百实时咬合手指的位置，无延迟感
                midWidget.style.transition = 'none';

                const uiInScene = canvas.querySelectorAll('.weather-text, .control-l, .control-r, .nav-item-base, .map-ui-item');
                uiInScene.forEach(el => el.style.transition = fastTransition);

                // 动态决断 swapped
                if (isStateA) {
                    if (_dragMode === 'right-edge') canvas.classList.remove('swapped');
                    else canvas.classList.add('swapped');
                } else if (isStateC) {
                    if (_dragMode === 'right-edge') canvas.classList.add('swapped');
                    else canvas.classList.remove('swapped');
                }

                canvas.classList.remove('state-c');
                canvas.classList.add('state-2');

                if (_dragMode === 'right-edge') {
                    applySnap(1872); // 产生正确的 24px 右侧间距
                } else {
                    applySnap(-24);  // 产生正确的 24px 左侧间距
                }

                // 强制重绘，确保空间转移不留痕迹
                void canvas.offsetWidth;

                const timerFunc = () => {
                    if (_dragMode === 'right-edge') _rightEdgeTimer = null;
                    else _leftEdgeTimer = null;
                    sceneContainer_gesture.style.transition = 'none';
                    mapWindow.style.transition = 'none';
                    uiInScene.forEach(el => el.style.transition = '');
                };

                if (_dragMode === 'right-edge') {
                    _rightEdgeTimer = setTimeout(timerFunc, 200);
                } else {
                    _leftEdgeTimer = setTimeout(timerFunc, 200);
                }
            }
        });

        // 2) 状态B：分割线开始拖拽
        dividerZone.addEventListener('pointerdown', (e) => {
            _dragMode = 'divider';
            _dividerDownX = e.clientX; // 记录按下的位置，以区分点击与拖拽
            e.preventDefault();
            sceneContainer_gesture.style.transition = 'none';
            mapWindow.style.transition = 'none';
            midWidget.style.transition = 'none';

            const isSwapped = canvas.classList.contains('swapped');
            const leftEl = isSwapped ? mapWindow : sceneContainer_gesture;
            const curLeftW = parseFloat(leftEl.style.width) || leftEl.offsetWidth;
            applySnap(curLeftW);
        });

        // 统一 move
        document.addEventListener('pointermove', (e) => {
            if (!_dragMode) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = 1920 / rect.width;
            const pointerX = (e.clientX - rect.left) * scaleX;

            let leftW = Math.max(-24, Math.min(1872, pointerX - 36));
            applySnap(leftW);

            let currentW = parseFloat(sceneContainer_gesture.style.width);
            if (isNaN(currentW)) currentW = sceneContainer_gesture.offsetWidth;
            window.dispatchEvent(new CustomEvent('app-scene-drag', { detail: { width: currentW } }));
        });

        // 统一 up
        document.addEventListener('pointerup', (e) => {
            if (!_dragMode) return;
            const mode = _dragMode;
            _dragMode = null;
            midWidget.style.transition = ''; /* restore CSS transition for snap animation */

            const rect = canvas.getBoundingClientRect();
            const scaleX = 1920 / rect.width;
            const pointerX = (e.clientX - rect.left) * scaleX;
            const leftW = Math.max(-24, Math.min(1872, pointerX - 36));

            if (_rightEdgeTimer) { clearTimeout(_rightEdgeTimer); _rightEdgeTimer = null; }
            if (_leftEdgeTimer) { clearTimeout(_leftEdgeTimer); _leftEdgeTimer = null; }

            const uiEls = canvas.querySelectorAll('.weather-text, .good-morning, .control-l, .control-r, .nav-item-base, .map-ui-item');

            // 检查是否为点击 (移动距离极小)
            const downX = (mode === 'divider') ? _dividerDownX : _edgeDownX;
            const isClick = Math.abs(e.clientX - downX) < 10;

            if (isClick) {
                // 点击边缘或bar，窗口化动画修改成200ms
                const fastTransition = 'all 200ms ease-out';
                sceneContainer_gesture.style.transition = fastTransition;
                mapWindow.style.transition = fastTransition;
                midWidget.style.transition = fastTransition;
                uiEls.forEach(el => el.style.transition = fastTransition); // 保证 UI 跟随 200ms 同步回弹
                uiEls.forEach(el => el.style.opacity = '');

                // 强制重绘，避免状态变化时没有动画而产生“跳变”
                void sceneContainer_gesture.offsetWidth;

                if (mode === 'divider') {
                    // 在左侧1/3和右侧1/3之间切换
                    let targetW = (Math.abs(leftW - 616) < Math.abs(leftW - 1232)) ? 1232 : 616;
                    snapByLeftWidth(targetW);
                } else if (mode === 'left-edge') {
                    snapByLeftWidth(0); // 仅仅点击边缘，退回左边缘全屏
                } else if (mode === 'right-edge') {
                    snapByLeftWidth(1848); // 仅仅点击边缘，退回右边缘全屏
                }
            } else {
                sceneContainer_gesture.style.transition = '';
                mapWindow.style.transition = '';
                midWidget.style.transition = '';
                uiEls.forEach(el => {
                    el.style.transition = '';
                    el.style.opacity = '';
                });

            });

            goHomeFill.addEventListener('pointermove', (e) => {
                if (!sliderDragging) return;

                const scaleX = 1920 / rect.width;
                const deltaX = (e.clientX - sliderDownX) * scaleX;
                let newW = MIN_SLIDER_W + deltaX;
                newW = Math.max(MIN_SLIDER_W, Math.min(MAX_SLIDER_W, newW));

    <script type="module">
        import * as THREE from "three";

        // ─── 1. Scene ─────────────────────────────────────────────────────────────

        const renderer = new THREE.WebGLRenderer({ canvas: threeCanvas, antialias: true, alpha: true });

        // ─── 3. Camera & Controls ─────────────────────────────────────────────────
        function focalToFov(mm) {
            return 2 * Math.atan(24 / (2 * mm)) * (180 / Math.PI);
        }
        const camera = new THREE.PerspectiveCamera(
            focalToFov(parseFloat(document.getElementById('ctrl-focal').value)),

            }
        }

        // 摇臂相机：球坐标辅助函数
        function applyCraneCamera(dist, elevDeg, azDeg) {
            const elev = elevDeg * Math.PI / 180;
            const az = azDeg * Math.PI / 180;
            const rh = dist * Math.cos(elev);
            camera.position.set(
                controls.target.x + rh * Math.sin(az),
                controls.target.y + dist * Math.sin(elev),
                controls.target.z + rh * Math.cos(az)
            );
            controls.update();
            groundUniforms.cameraPos.value.copy(camera.position);
        }
        function readCraneSliders() {
            return {
                dist: parseFloat(document.getElementById('ctrl-distance').value),
                elev: parseFloat(document.getElementById('ctrl-elevation').value),

        // 滑块绑定 → 摇臂相机

            const az = Math.atan2(rel.x, rel.z) * 180 / Math.PI;

            document.getElementById('val-distance').innerText = dist.toFixed(1);

            document.getElementById('val-azimuth').innerText = az.toFixed(0) + '°';
        });

        // 边缘区域保留给手势交互，不响应旋转
        threeCanvas.addEventListener('pointerdown', (e) => {
            const rect = threeCanvas.getBoundingClientRect();
            const scale = rect.width / (threeCanvas.clientWidth || 1);
            const inset = 120 * scale;
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            if (x < inset || x > rect.width - inset || y < inset || y > rect.height - inset) {
                controls.enabled = false;

                    controls.enabled = true;

        // ─── 4. Loading Manager ──────────────────────────────────────────────────
        const loadingScreen = document.getElementById('loading-screen');

        // ─── 5. 选择性 Bloom 后期处理 ────────────────────────────────────────────
        const BLOOM_LAYER = 1;
        const bloomLayer = new THREE.Layers();
        bloomLayer.set(BLOOM_LAYER);

        const _initW = sceneContainer.offsetWidth || 1920;
        const _initH = sceneContainer.offsetHeight || 1080;
        renderer.setSize(_initW, _initH, true);
        const dpr = Math.min(window.devicePixelRatio, 2);

        const bloomComposer = new EffectComposer(renderer);
        bloomComposer.setPixelRatio(dpr);
        bloomComposer.renderToScreen = false;
        bloomComposer.addPass(new RenderPass(scene, camera));
        const bloomPass = new UnrealBloomPass(
            new THREE.Vector2(_initW, _initH),

        );
        bloomComposer.addPass(bloomPass);

        const finalPass = new ShaderPass(
            new THREE.ShaderMaterial({
                uniforms: {
                    baseTexture: { value: null },
                    bloomTexture: { value: bloomComposer.renderTarget2.texture }
                },
                vertexShader: `

        const finalRenderTarget = new THREE.WebGLRenderTarget(_initW, _initH, {

        finalComposer.setPixelRatio(dpr);

        const darkMaterial = new THREE.MeshBasicMaterial({ color: '#000000' });

        // ─── 6. 灯光系统 ─────────────────────────────────────────────────────────
        const ambientLight = new THREE.AmbientLight('#223344', 0.16);

        // ─── 新增：天空与地面自定义着色器 ──────────────────────────────────────
        const skyUniforms = {
            topColor: { value: new THREE.Color('#aaccff') },
            bottomColor: { value: new THREE.Color('#e8ecf0') },
            offset: { value: 33 },
            exponent: { value: 0.6 }
        };
        const skyGeo = new THREE.SphereGeometry(500, 32, 15);
        const skyMat = new THREE.ShaderMaterial({
            uniforms: skyUniforms,
            vertexShader: `
                varying vec3 vWorldPosition;
                void main() {
                    vec4 worldPosition = modelMatrix * vec4( position, 1.0 );
                    vWorldPosition = worldPosition.xyz;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4( position, 1.0 );

            `,
            fragmentShader: `
                uniform vec3 topColor;

                varying vec3 vWorldPosition;
                void main() {
                    float h = normalize( vWorldPosition + vec3( 0.0, offset, 0.0 ) ).y;
                    gl_FragColor = vec4( mix( bottomColor, topColor, max( pow( max( h, 0.0 ), exponent ), 0.0 ) ), 1.0 );
                }
            `,
            side: THREE.BackSide,
            depthWrite: false
        });
        const skyMesh = new THREE.Mesh(skyGeo, skyMat);
        scene.add(skyMesh);

        const groundUniforms = {
            nearColor: { value: new THREE.Color('#99aabb') },
            farColor: { value: new THREE.Color('#e8ecf0') },
            cameraPos: { value: new THREE.Vector3() },

        };
        const groundGeo = new THREE.PlaneGeometry(1000, 1000, 1, 1);
        const groundMat = new THREE.ShaderMaterial({

                varying vec3 vWorldPosition;

            fragmentShader: `

                uniform vec3 farColor;

                uniform float groundDepth;
                uniform float horizonBlur;
                uniform float farFadeStart;
                uniform float farFadeEnd;

                void main() {

            `,
            transparent: true,

        });
        const groundMesh = new THREE.Mesh(groundGeo, groundMat);

        // ─── 8. 地面网格（蓝色 FUI 网格，AdditiveBlending）─────────────────────
        const gridTex = (() => {
            const res = 256;
            const cv = document.createElement("canvas");
            cv.width = cv.height = res;
            const c = cv.getContext("2d");
            c.fillStyle = "#000";
            c.fillRect(0, 0, res, res);

            const tex = new THREE.CanvasTexture(cv);

        // ─── 10. 材质工厂（完整 PBR，ORM 通道重排 + Detail Bump + 菲涅尔）────────
        const texLoader = new THREE.TextureLoader(loadingManager);

        function loadPBR(name, isTransparent = false) {
            const base = texLoader.load(`texture/Tex_${name}_Base.jpg`);
            base.flipY = false;
            base.anisotropy = 8;
            base.colorSpace = THREE.SRGBColorSpace;

            // 玻璃：Mask 贴图精确控制局部透明度
            if (isTransparent) {
                const glassMask = texLoader.load('texture/Tex__Glass_Mask.png');
                glassMask.flipY = false;
                const glassNorm = texLoader.load('texture/Tex_Glass_Normal.png');
                glassNorm.flipY = false;

                const glassMat = new THREE.MeshPhysicalMaterial({
                    map: base,
                    normalMap: glassNorm,
                    color: '#111115',
                    metalness: 0.1,
                    roughness: 0.05,
                    envMapIntensity: 1.0,
                    reflectivity: 0.9,
                    transparent: true,

                    depthWrite: true,
